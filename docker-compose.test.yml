services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: sh -c "npx prisma migrate deploy && npm run db:seed && npm run dev -- --hostname 0.0.0.0"
    environment:
      DATABASE_URL: postgresql://boardgame:boardgame@postgres:5432/boardgame_test?schema=public
      SESSION_SECRET: docker-test-session-secret-change-me
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: boardgame
      POSTGRES_PASSWORD: boardgame
      POSTGRES_DB: boardgame_test
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boardgame -d boardgame_test"]
      interval: 5s
      timeout: 5s
      retries: 20

